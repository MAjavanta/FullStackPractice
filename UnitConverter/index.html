<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Unit Converter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="col-layout-sect" id="hero">
      <h1>Metric/Imperial Unit Converter</h1>
      <input type="number" id="user-input"/>
      <button id="convert-btn">Convert</button>
    </section>
    <section class="col-layout-sect" id="conversions-sct">
      <div class="conversion-card">
        <h2>Length (Metre/Feet)</h2>
        <p id="length-conversion"></p>
      </div>
      <div class="conversion-card">
        <h2>Volume (Litres/Gallons)</h2>
        <p id="volume-conversion"></p>
      </div>
      <div class="conversion-card">
        <h2>Mass (Kilograms/Pounds)</h2>
        <p id="mass-conversion"></p>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
